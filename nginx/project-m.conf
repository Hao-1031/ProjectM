# Project-M Nginx 反向代理配置
# 使用方式：
#   1. 将本文件复制到 /etc/nginx/sites-available/project-m
#   2. 编辑 server_name 为你的域名或服务器 IP
#   3. ln -s /etc/nginx/sites-available/project-m /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx

upstream project_m_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # 申请 Certbot 证书时保留此 location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://project_m_app;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
        proxy_buffering off;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

